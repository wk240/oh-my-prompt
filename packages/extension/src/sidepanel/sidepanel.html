<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oh My Prompt</title>
  <link rel="stylesheet" href="./index.css">
  <!-- Pre-React script: restore folder permission before React loads (capture user gesture) -->
  <script>
  (async function preReactPermissionRestore() {
    try {
      const db = await new Promise((resolve, reject) => {
        const request = indexedDB.open('oh-my-prompt-sync', 1);
        request.onerror = () => reject(request.error);
        request.onsuccess = () => resolve(request.result);
        request.onupgradeneeded = (event) => {
          const database = event.target.result;
          if (!database.objectStoreNames.contains('handles')) {
            database.createObjectStore('handles');
          }
        };
      });
      const handle = await new Promise((resolve) => {
        try {
          const transaction = db.transaction(['handles'], 'readonly');
          const store = transaction.objectStore('handles');
          const request = store.get('folderHandle');
          request.onerror = () => resolve(null);
          request.onsuccess = () => resolve(request.result);
        } catch { resolve(null); }
      });
      if (handle) {
        const permission = await handle.queryPermission({ mode: 'readwrite' });
        if (permission === 'prompt') {
          const result = await handle.requestPermission({ mode: 'readwrite' });
          if (result === 'granted') {
            chrome.runtime.sendMessage({
              type: 'SET_SETTINGS_ONLY',
              payload: { settings: { syncEnabled: true, hasUnsyncedChanges: false } }
            }).catch(() => {});
          }
        } else if (permission === 'granted') {
          chrome.runtime.sendMessage({
            type: 'SET_SETTINGS_ONLY',
            payload: { settings: { syncEnabled: true } }
          }).catch(() => {});
        }
      }
      db.close();
    } catch (e) { console.warn('[Oh My Prompt] Pre-React permission check failed:', e); }
  })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./sidepanel.tsx"></script>
</body>
</html>
